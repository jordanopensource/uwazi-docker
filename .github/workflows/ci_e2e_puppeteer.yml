name: E2E Puppeteer

on:
  workflow_call:

jobs:
  e2e-puppeteer:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        suite-dir: ['suite1', 'suite2', 'mobile']
    services:
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.18.0-amd64
        ports:
          - 9200/tcp
        options: >-
          --memory=2g
          --memory-swap=2g
          --memory-swappiness=0
          -e="discovery.type=single-node"
          -e="xpack.security.enabled=false"
          -e="ES_JAVA_OPTS=-Xms1g -Xmx1g"
          -e="cluster.routing.allocation.disk.threshold_enabled=false"
          -e="logger.level=WARN"
          -e="ingest.geoip.downloader.enabled=false"
          --health-cmd="curl -f http://localhost:9200"
          --health-interval=10s
          --health-timeout=10s
          --health-retries=10
      redis:
        image: redis:5.0.14
        ports:
          - 6379:6379
    steps:
      - name: Install MongoDB tools
        run: |
          # Add MongoDB repo
          if [ ! -f /etc/apt/sources.list.d/mongodb-org-7.0.list ]; then
            sudo apt-get update -qq
            sudo apt-get install -y wget gnupg
            wget -qO - https://www.mongodb.org/static/pgp/server-7.0.asc | sudo apt-key add -
            echo "deb [ arch=amd64,arm64 ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-7.0.list
          fi
          sudo apt-get update -qq
          sudo apt-get install -y mongodb-mongosh mongodb-org-tools

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.8.0
        with:
          mongodb-version: 7.0
          mongodb-replica-set: test-rs
      - uses: actions/checkout@v4
      - name: Setup Nodejs
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ./node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
      - name: install dependencies
        run: yarn install
      - name: Install poppler-utils
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y poppler-utils

      - name: Verify poppler-utils installation
        run: |
          pdftotext -v
          pdftoppm -v
          pdfinfo -v
      - name: Wait For and Download Artifact
        run: |
          sudo apt-get update -qq && sudo apt-get install -y jq unzip

          i=1
          while [ $i -le 60 ]; do
            echo "Attempt $i: Checking for artifact..."
            ARTIFACT_URL=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
              | jq -r '.artifacts[] | select(.name=="prod") | .archive_download_url')

            if [ -n "$ARTIFACT_URL" ]; then
              echo "Artifact found. Downloading with curl..."
              mkdir -p ./prod
              curl -s -L -o artifact.zip \
                -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github.v3+json" \
                "$ARTIFACT_URL"
              unzip -q artifact.zip -d ./prod
              echo "Artifact downloaded and unzipped successfully."
              exit 0
            fi

            echo "Artifact not yet found. Waiting 20 seconds..."
            sleep 20
            i=$(expr $i + 1)
          done

          echo "Timed out waiting for artifact."
          exit 1
        timeout-minutes: 6
      - run: yarn e2e-fixtures
        env:
          DBHOST: localhost:27017
          ELASTICSEARCH_URL: http://localhost:${{ job.services.elasticsearch.ports[9200] }}
          DATABASE_NAME: uwazi_e2e
          INDEX_NAME: uwazi_e2e
          TRANSPILED: true
      - name: start Uwazi
        env:
          DBHOST: localhost:27017
          ELASTICSEARCH_URL: http://localhost:${{ job.services.elasticsearch.ports[9200] }}
          DATABASE_NAME: uwazi_e2e
          INDEX_NAME: uwazi_e2e
        run: .github/scripts/start-uwazi.sh
      - run: xvfb-run -a yarn e2e-puppeteer-all --roots '<rootDir>/${{ matrix.suite-dir }}'
        timeout-minutes: 25
        env:
          DBHOST: localhost:27017
          ELASTICSEARCH_URL: http://localhost:${{ job.services.elasticsearch.ports[9200] }}
          TRANSPILED: true
      - name: Print server output
        run: |
          echo "📁 Startup logs:"
          cat .github/logs/start-uwazi-logs.txt || echo "Startup log file not found"
          echo
          echo "📁 Health-check logs:"
          cat .github/logs/health-check-logs.txt || echo "Health-check log file not found"
        if: failure()
