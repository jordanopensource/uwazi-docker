name: e2e cypress BASE

on:
  push:
    branches:
      - development
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-cypress:
    runs-on: ubuntu-24.04
    env:
      CYPRESS_RETRIES: 2
    services:
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:7.17.7-amd64
        ports:
          - '9200:9200'
        options: >-
          -e "discovery.type=single-node"
          --health-cmd="curl http://localhost:9200/_cluster/health"
          --health-interval=10s
          --health-timeout=30s
          --health-retries=10
      redis:
        image: redis:5.0.14
        ports:
          - 6379:6379

    steps:
      # MongoDB Setup
      - name: 🍃 Install MongoDB tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -qO - https://www.mongodb.org/static/pgp/server-6.0.asc | sudo apt-key add -
          echo "deb [ arch=amd64,arm64 ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/6.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-6.0.list
          sudo apt-get update
          sudo apt-get install -y mongodb-mongosh mongodb-org-tools

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.8.0
        with:
          mongodb-version: 6.0
          mongodb-replica-set: test-rs

      # Repository Setup
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Node.js Setup with Cypress Caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Get yarn cache directory
        id: yarn-cache-dir
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies and Cypress binary
        uses: actions/cache@v4
        id: cache
        with:
          path: |
            ${{ steps.yarn-cache-dir.outputs.dir }}
            node_modules
            ~/.cache/Cypress
          key: ${{ runner.os }}-cypress-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-cypress-

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        if: steps.cache.outputs.cache-hit != 'true'

      - name: Verify Cypress
        run: npx cypress verify

      # System Dependencies
      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      # Build Cache
      - name: Cache build
        id: cache-build
        uses: actions/cache@v4
        with:
          path: prod
          key: ${{ runner.os }}-build-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Build production
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: yarn production-build

      # Python Services Setup
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Clone and setup dummy services
        uses: actions/checkout@v4
        with:
          repository: huridocs/dummy_extractor_services
          path: dummy_extractor_services

      - name: Setup Python virtual environment
        working-directory: dummy_extractor_services
        run: |
          python3 -m venv .venv
          make install_venv

      - name: Start dummy services
        run: |
          make start -C dummy_extractor_services > logs.log &
          sleep 5
          wget --waitretry=5 --retry-connrefused -v http://localhost:5051/info

      # Uwazi Setup
      - name: Initialize blank state
        id: blank-state
        run: |
          yarn blank-state || yarn blank-state --force
        env:
          DBHOST: localhost:27017
          ELASTICSEARCH_URL: http://localhost:9200
          DATABASE_NAME: uwazi_e2e
          INDEX_NAME: uwazi_e2e
          TRANSPILED: true

      - name: Configure IX
        run: yarn ix-config
        env:
          DBHOST: localhost:27017
          DATABASE_NAME: uwazi_e2e

      # Uwazi Server
      - name: Start Uwazi server
        run: yarn run-production > output.txt &
        env:
          NOTIFICATION_DELAY: 50
          DBHOST: localhost:27017
          ELASTICSEARCH_URL: http://localhost:9200
          DATABASE_NAME: uwazi_e2e
          INDEX_NAME: uwazi_e2e
          EXTERNAL_SERVICES: true

      - name: Wait for Uwazi to be ready
        run: |
          for i in {1..12}; do
            if curl -sSf http://localhost:3000 >/dev/null; then
              echo "Server is up!"
              exit 0
            fi
            sleep 5
          done
          echo "Server did not start in time"
          exit 1
        timeout-minutes: 3

      # Cypress Tests
      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          component: false
          config-file: cypress.config.ts
          spec: 'cypress/e2e/*.cy.ts'
        timeout-minutes: 25
        env:
          DBHOST: localhost:27017
          ELASTICSEARCH_URL: http://localhost:9200
          TRANSPILED: true

      # Artifacts on Failure
      - name: Upload snapshots on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: cypress-snapshots
          path: cypress/e2e/**/__image_snapshots__/

      - name: Upload videos on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos/

      - name: Print server output on failure
        if: ${{ failure() }}
        run: cat output.txt
