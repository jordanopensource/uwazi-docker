name: e2e cypress SETTINGS

on:
  pull_request:
    branches: [development, staging, production]
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - converted_to_draft

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-cypress:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    env:
      CYPRESS_RETRIES: 2
    services:
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:7.17.7-amd64
        ports:
          - 9200/tcp
        options: -e="discovery.type=single-node" --health-cmd="curl http://localhost:9200/_cluster/health" --health-interval=10s --health-timeout=30s --health-retries=10
      redis:
        image: redis:5.0.14
        ports:
          - 6379:6379

    steps:
      - name: 🍃 Install mongosh
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -qO - https://www.mongodb.org/static/pgp/server-6.0.asc | sudo apt-key add -
          echo "deb [ arch=amd64,arm64 ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/6.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-6.0.list
          sudo apt-get update
          sudo apt-get install -y mongodb-mongosh
          sudo apt-get install -y mongodb-org-tools
      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.8.0
        with:
          mongodb-version: 6.0
          mongodb-replica-set: test-rs
      - name: Checkout reposistory
        uses: actions/checkout@v4
      - name: Setup Nodejs
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Cache node modules and Cypress
        uses: actions/cache@v4
        with:
          path: |
            ./node_modules
            ~/.cache/Cypress
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
      - name: install dependencies
        run: yarn install
      - run: sudo apt update
      - run: sudo apt-get install poppler-utils
      - name: Cache build
        id: cache-build
        uses: actions/cache@v4
        with:
          path: ./prod
          key: >-
            ${{ runner.os }}-build-${{ github.ref }}-${{ github.sha }}-
            ${{ hashFiles('app/**/*.*') }}-
            ${{ hashFiles('database/**/*.*') }}-
            ${{ hashFiles('**/yarn.lock') }}-
            ${{ hashFiles('**/webpack.production.config.js') }}-
            ${{ hashFiles('**/.babelrc') }}-
            ${{ hashFiles('webpack/**/config.js') }}-
      - name: build production
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: yarn production-build
      - run: yarn blank-state
        id: blank-state-attempt1
        continue-on-error: true
        env:
          DBHOST: localhost:27017
          ELASTICSEARCH_URL: http://localhost:${{ job.services.elasticsearch.ports[9200] }}
          DATABASE_NAME: uwazi_e2e
          INDEX_NAME: uwazi_e2e
          TRANSPILED: true
      - run: yarn blank-state --force
        id: blank-state-attempt2
        if: steps.blank-state-attempt1.outcome == 'failure'
        env:
          DBHOST: localhost:27017
          ELASTICSEARCH_URL: http://localhost:${{ job.services.elasticsearch.ports[9200] }}
          DATABASE_NAME: uwazi_e2e
          INDEX_NAME: uwazi_e2e
          TRANSPILED: true
      - run: yarn ix-config
        env:
          DBHOST: localhost:27017
          DATABASE_NAME: uwazi_e2e
      - name: start Uwazi
        env:
          NOTIFICATION_DELAY: 50
          DBHOST: localhost:27017
          ELASTICSEARCH_URL: http://localhost:${{ job.services.elasticsearch.ports[9200] }}
          DATABASE_NAME: uwazi_e2e
          INDEX_NAME: uwazi_e2e
        run: .github/scripts/start-uwazi.sh
      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          component: false
          config-file: cypress.config.ts
          spec: 'cypress/e2e/settings/*.cy.ts'
        timeout-minutes: 25
        env:
          DBHOST: localhost:27017
          ELASTICSEARCH_URL: http://localhost:${{ job.services.elasticsearch.ports[9200] }}
          TRANSPILED: true
      - uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: snapshots
          path: cypress/e2e/**/__image_snapshots__/
      - uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: video
          path: cypress/videos/
      - name: Print server output
        run: cat output.txt
        if: failure()
