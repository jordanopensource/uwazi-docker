name: E2E Cypress Tests

on:
  workflow_call:

env:
  REGISTRY: ghcr.io
  CYPRESS_IMAGE_NAME: ${{ github.repository }}-cypress-e2e

jobs:
  e2e-cypress:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository }}-cypress-e2e:latest
      options: --ipc=host
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: base
            spec: 'cypress/e2e/base/*.cy.ts'
            needs_setup: false
            needs_ix_config: false
            needs_external_services: false
          - name: entities
            spec: 'cypress/e2e/entities/*.cy.ts'
            needs_setup: false
            needs_ix_config: false
            needs_external_services: false
          - name: information-extraction
            spec: 'cypress/e2e/informationExtraction/*.cy.ts'
            needs_setup: true
            needs_ix_config: true
            needs_external_services: true
          - name: pages
            spec: 'cypress/e2e/pages/*.cy.ts'
            needs_setup: false
            needs_ix_config: false
            needs_external_services: false
          - name: settings
            spec: 'cypress/e2e/settings/*.cy.ts'
            needs_setup: false
            needs_ix_config: false
            needs_external_services: false
    env:
      CYPRESS_RETRIES: 2
    services:
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.18.0-amd64
        ports:
          - 9200/tcp
        options: >-
          --memory=2g
          --memory-swap=2g
          --memory-swappiness=0
          -e="discovery.type=single-node"
          -e="xpack.security.enabled=false"
          -e="ES_JAVA_OPTS=-Xms1g -Xmx1g"
          -e="cluster.routing.allocation.disk.threshold_enabled=false"
          -e="logger.level=WARN"
          -e="ingest.geoip.downloader.enabled=false"
          --health-cmd="curl -f http://localhost:9200"
          --health-interval=10s
          --health-timeout=10s
          --health-retries=10
      redis:
        image: redis:6.0-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      
      - name: Start MongoDB replica set
        run: /usr/local/bin/setup-mongo-replica.sh

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ./node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
      - name: install dependencies
        run: yarn install
      
      - name: Cache Cypress binary
        id: cypress-cache
        uses: actions/cache@v4
        with:
          path: /github/home/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            cypress-${{ runner.os }}-
      
      - name: Install Cypress binary if not cached
        if: steps.cypress-cache.outputs.cache-hit != 'true'
        run: npx cypress install

      - name: Verify pre-installed tools
        run: |
          echo "Verifying mongosh..."
          mongosh --version
          echo "Verifying poppler-utils..."
          pdftotext -v
          pdftoppm -v
          pdfinfo -v
          echo "Verifying Chrome..."
          google-chrome --version && echo "✓ Chrome detected" || echo "❌ Chrome not found"
          echo "Verifying Xvfb..."
          which xvfb-run
          echo "Verifying Python..."
          python3.11 --version
      - name: Download production build artifact
        uses: actions/download-artifact@v4
        with:
          name: prod
          path: ./prod
      - name: Clone dummy services
        if: matrix.needs_setup
        uses: actions/checkout@v4
        with:
          repository: huridocs/dummy_extractor_services
          path: dummy_extractor_services
      - name: Setup dummy services
        if: matrix.needs_setup
        run: |
          python3.11 -m venv .venv
          make install_venv
          make start > logs.log &
          sleep 5 && wget --waitretry=5 --retry-connrefused -v http://localhost:5051/info
        working-directory: dummy_extractor_services
      - name: Log dummy services on failure
        if: matrix.needs_setup && failure()
        run: cat dummy_extractor_services/logs.log
      - name: Configure IX settings
        if: matrix.needs_ix_config
        run: yarn ix-config
        env:
          DBHOST: localhost:27017
          DATABASE_NAME: uwazi_e2e
      - run: yarn blank-state
        id: blank-state-attempt1
        continue-on-error: true
        env:
          DBHOST: localhost:27017
          ELASTICSEARCH_URL: http://elasticsearch:9200
          DATABASE_NAME: uwazi_e2e
          INDEX_NAME: uwazi_e2e
          TRANSPILED: true
      - run: yarn blank-state --force
        id: blank-state-attempt2
        if: steps.blank-state-attempt1.outcome == 'failure'
        env:
          DBHOST: localhost:27017
          ELASTICSEARCH_URL: http://elasticsearch:9200
          DATABASE_NAME: uwazi_e2e
          INDEX_NAME: uwazi_e2e
          TRANSPILED: true
          
      - name: Forward ports for container networking
        run: |
          echo "Setting up port forwarding for container networking..."
          
          # Check if socat is available
          if ! command -v socat >/dev/null 2>&1; then
            echo "ERROR: socat is not installed. Cannot set up port forwarding."
            echo "Installing socat now..."
            apt-get update -qq && apt-get install -y socat
          fi
          
          # Try to find the actual IP addresses of the services
          echo "Finding service IP addresses..."
          REDIS_IP=""
          ELASTICSEARCH_IP=""
          
          # Scan for Redis IP
          for ip in $(seq 1 10); do
            test_ip="172.18.0.$ip"
            if [ "$test_ip" != "172.18.0.2" ]; then
              if nc -z $test_ip 6379 2>/dev/null; then
                REDIS_IP="$test_ip"
                echo "Found Redis at $REDIS_IP:6379"
                break
              fi
            fi
          done
          
          # Scan for Elasticsearch IP
          for ip in $(seq 1 10); do
            test_ip="172.18.0.$ip"
            if [ "$test_ip" != "172.18.0.2" ]; then
              if nc -z $test_ip 9200 2>/dev/null; then
                ELASTICSEARCH_IP="$test_ip"
                echo "Found Elasticsearch at $ELASTICSEARCH_IP:9200"
                break
              fi
            fi
          done
          
          # Set up port forwarding with IP addresses if found, otherwise use hostnames
          if [ -n "$REDIS_IP" ]; then
            echo "Forwarding localhost:6379 to $REDIS_IP:6379"
            nohup socat TCP-LISTEN:6379,fork,reuseaddr TCP:$REDIS_IP:6379 > socat-redis.log 2>&1 &
            echo "Redis socat command started with PID: $!"
          else
            echo "Using hostname for Redis forwarding: localhost:6379 to redis:6379"
            nohup socat TCP-LISTEN:6379,fork,reuseaddr TCP:redis:6379 > socat-redis.log 2>&1 &
            echo "Redis socat command started with PID: $!"
          fi
          
          if [ -n "$ELASTICSEARCH_IP" ]; then
            echo "Forwarding localhost:9200 to $ELASTICSEARCH_IP:9200"
            nohup socat TCP-LISTEN:9200,fork,reuseaddr TCP:$ELASTICSEARCH_IP:9200 > socat-elasticsearch.log 2>&1 &
            echo "Elasticsearch socat command started with PID: $!"
          else
            echo "Using hostname for Elasticsearch forwarding: localhost:9200 to elasticsearch:9200"
            nohup socat TCP-LISTEN:9200,fork,reuseaddr TCP:elasticsearch:9200 > socat-elasticsearch.log 2>&1 &
            echo "Elasticsearch socat command started with PID: $!"
          fi
          
          sleep 2
          echo "Port forwarding setup complete"
          echo ""
          echo "=== VERIFYING PORT FORWARDING ==="
          echo "Checking socat processes:"
          ps aux | grep socat | grep -v grep || echo "No socat processes found"
          echo ""
          echo "Testing forwarded ports:"
          echo "  localhost:6379 (should forward to redis:6379):"
          nc -z localhost 6379 && echo "  ✅ localhost:6379 is now open" || echo "  ❌ localhost:6379 still closed"
          echo "  localhost:9200 (should forward to elasticsearch:9200):"
          curl -s --connect-timeout 5 http://localhost:9200/_cluster/health && echo "  ✅ localhost:9200 is now accessible" || echo "  ❌ localhost:9200 still not accessible"
          echo ""
          echo "Testing socat connectivity:"
          echo "  Testing if socat can reach redis:6379:"
          nc -z redis 6379 && echo "  ✅ redis:6379 reachable from socat" || echo "  ❌ redis:6379 not reachable from socat"
          echo "  Testing if socat can reach elasticsearch:9200:"
          nc -z elasticsearch 9200 && echo "  ✅ elasticsearch:9200 reachable from socat" || echo "  ❌ elasticsearch:9200 not reachable from socat"
          echo ""
          echo "Checking socat logs for errors:"
          if [ -f socat-redis.log ]; then
            echo "Redis socat log:"
            cat socat-redis.log
          fi
          if [ -f socat-elasticsearch.log ]; then
            echo "Elasticsearch socat log:"
            cat socat-elasticsearch.log
          fi
          
      - name: start Uwazi
        env:
          NOTIFICATION_DELAY: 50
          DBHOST: localhost:27017
          ELASTICSEARCH_URL: http://localhost:9200
          DATABASE_NAME: uwazi_e2e
          INDEX_NAME: uwazi_e2e
          EXTERNAL_SERVICES: ${{ matrix.needs_external_services }}
          FEATURE_FLAG_PARAGRAPH_EXTRACTION: ${{ matrix.needs_external_services }}
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: .github/scripts/start-uwazi.sh
      
      - name: Debug - Check Uwazi startup and application state
        run: |
          echo "=== UWAZI STARTUP DEBUG ==="
          echo "Checking if Uwazi process is running:"
          ps aux | grep -E "(node|uwazi|server\.js)" | grep -v grep || echo "No Uwazi process found"
          echo ""
          echo "Checking Uwazi health endpoint:"
          for i in {1..10}; do
            echo "Attempt $i/10..."
            if curl -s http://localhost:3000/api/version; then
              echo "✅ Uwazi is responding"
              break
            else
              echo "❌ Uwazi not responding yet"
              sleep 3
            fi
          done
          echo ""
          echo "Checking application logs:"
          echo "Current directory: $(pwd)"
          echo "Looking for log files..."
          find . -name "*start-uwazi*" -o -name "*health-check*" 2>/dev/null || echo "No log files found"
          echo ""
          if [ -f .github/logs/start-uwazi-logs.txt ]; then
            echo "=== UWAZI STARTUP LOGS (last 50 lines) ==="
            tail -50 .github/logs/start-uwazi-logs.txt
          else
            echo "Startup log file not found at .github/logs/start-uwazi-logs.txt"
            echo "Checking if startup script has run yet..."
            ls -la .github/ 2>/dev/null || echo ".github directory not found"
            ls -la .github/logs/ 2>/dev/null || echo ".github/logs directory not found"
          fi
          echo ""
          echo "=== NETWORK CONNECTIVITY TEST ==="
          echo "Testing localhost connectivity:"
          curl -s http://localhost:3000/api/version | head -1 || echo "localhost:3000 not reachable"
          echo ""
          echo "Testing container networking:"
          echo "Testing localhost:9200 (elasticsearch)..."
          curl -s --connect-timeout 5 http://localhost:9200/_cluster/health && echo "✅ localhost:9200 reachable" || echo "❌ localhost:9200 not reachable"
          echo "Testing localhost:6379 (redis)..."
          nc -z localhost 6379 && echo "✅ localhost:6379 reachable" || echo "❌ localhost:6379 not reachable"
          echo ""
          echo "=== BROWSER ENVIRONMENT ==="
          echo "Chrome binary location:"
          which google-chrome
          echo ""
          echo "Chrome permissions:"
          ls -la /usr/bin/google-chrome
          echo ""
          echo "Display environment:"
          echo "DISPLAY=$DISPLAY"
          echo "XDG_SESSION_TYPE=$XDG_SESSION_TYPE"
          
      - name: Cypress run - ${{ matrix.name }}
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          component: false
          config-file: cypress.config.ts
          spec: ${{ matrix.spec }}
          install: false
          # node_modules already installed, binary is cached
          record: false
          parallel: false
          config: |
            {
              "defaultCommandTimeout": 15000,
              "requestTimeout": 30000,
              "responseTimeout": 30000,
              "pageLoadTimeout": 30000,
              "video": true,
              "screenshotOnRunFailure": true,
              "trashAssetsBeforeRuns": false,
              "failFast": false
            }
        timeout-minutes: 25
        env:
          DBHOST: localhost:27017
          ELASTICSEARCH_URL: http://localhost:9200
          TRANSPILED: true
          CYPRESS_FAIL_FAST_ENABLED: false
          # DEBUG: cypress:server:reporter,cypress:server:specs,cypress:server:project
          # CYPRESS_DEBUG: false
          
      - uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: snapshots-${{ matrix.name }}
          path: cypress/e2e/**/__image_snapshots__/
      - uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: video-${{ matrix.name }}
          path: cypress/videos/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-info-${{ matrix.name }}
          path: .github/debug/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs-${{ matrix.name }}
          path: .github/logs/
      - name: Print server output
        run: |
          echo "📁 Startup logs:"
          if [ -f .github/logs/start-uwazi-logs.txt ]; then
            cat .github/logs/start-uwazi-logs.txt
          else
            echo "Startup log file not found"
            echo "Checking for log files in current directory:"
            find . -name "*log*" -type f 2>/dev/null | head -10 || echo "No log files found"
          fi
          echo
          echo "📁 Health-check logs:"
          if [ -f .github/logs/health-check-logs.txt ]; then
            cat .github/logs/health-check-logs.txt
          else
            echo "Health-check log file not found"
          fi
        if: failure()
