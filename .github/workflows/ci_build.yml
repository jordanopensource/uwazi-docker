name: Build production artifact

on:
  workflow_call:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  CYPRESS_IMAGE_NAME: ${{ github.repository }}-cypress-e2e

jobs:
  build_cypress_image:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Check if Docker image needs rebuilding
        id: changes
        run: |
          # Always build for manual workflow dispatch
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Manual workflow dispatch - building image"
          else
            # For other events, the Docker cache will handle whether to rebuild
            # based on the Dockerfile content hash in the cache key
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Building image (Docker cache will determine if rebuild is needed)"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        if: steps.changes.outputs.should_build == 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        if: steps.changes.outputs.should_build == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.CYPRESS_IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Set up Docker Buildx
        if: steps.changes.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push Cypress Docker image
        if: steps.changes.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./.github/ci/Dockerfile.cypress
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.CYPRESS_IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.CYPRESS_IMAGE_NAME }}:cache,mode=max

  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ./node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Cache Webpack
        uses: actions/cache@v4
        with:
          path: node_modules/.cache
          key: ${{ runner.os }}-webpack-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-webpack-${{ github.base_ref }}-
            ${{ runner.os }}-webpack-

      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: ~/.cache/yarn
          key: ${{ runner.os }}-yarn-cache-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-cache-

      - name: install dependencies
        run: yarn install
      - name: build production
        run: yarn production-build
      - name: Upload production build artifact
        uses: actions/upload-artifact@v4
        with:
          name: prod
          path: |
            ./prod/dist
            ./prod/app
            ./prod/database
            ./prod/scripts
            ./prod/public
            ./prod/package.json
            ./prod/server.js
            ./prod/message.js
            ./prod/contents
            ./prod/uploaded_documents
            ./prod/temporal_files
            ./prod/custom_uploads
            ./prod/log
          compression-level: 9
